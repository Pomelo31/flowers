<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jardín de tulipanes para mi amada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card" aria-label="Regalo digital de tulipanes">
    <section class="hero">
      <p class="eyebrow">Un jardín hecho con amor</p>
      <h1>Para mi amada</h1>
      <p class="dedication">
        Que estos tulipanes blancos, rosas y verdes te recuerden lo mucho que iluminas mi vida.
      </p>
    </section>

    <section class="garden" aria-label="Ramo de tulipanes blancos, rosas y verdes">
      <div class="bouquet">
        <div class="tulip tulip-white tall">
          <span class="stem"></span>
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
          <span class="flower"><i></i><b></b><em></em></span>
        </div>
        <div class="tulip tulip-pink medium">
          <span class="stem"></span>
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
          <span class="flower"><i></i><b></b><em></em></span>
        </div>
        <div class="tulip tulip-green short">
          <span class="stem"></span>
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
          <span class="flower"><i></i><b></b><em></em></span>
        </div>
        <div class="tulip tulip-pink tall lean-left">
          <span class="stem"></span>
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
          <span class="flower"><i></i><b></b><em></em></span>
        </div>
        <div class="tulip tulip-white medium lean-right">
          <span class="stem"></span>
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
          <span class="flower"><i></i><b></b><em></em></span>
        </div>
      </div>
      <div class="ribbon">Siempre tú 🌷</div>
    </section>

    <footer>
      <p>Con todo mi cariño, hoy y siempre.</p>
    </footer>
  </main>
</body>
</html>
